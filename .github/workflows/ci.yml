name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.4.0 or v1.4.0). Leave blank for a normal build with no release."
        required: false
        type: string

jobs:
  test-python:
    name: Test - Linux TUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + test deps
        run: |
          cd linux-tui
          pip install .
          pip install pytest
      - name: Run tests
        run: |
          cd linux-tui
          pytest -v

  build-flipper:
    name: Build - Flipper app (.fap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ufbt
        run: pip install ufbt
      - name: Build fap
        run: |
          cd flipper-app
          ufbt update
          ufbt build
      - name: Locate built fap
        id: find_fap
        run: |
          FAP_PATH=$(find flipper-app/dist -name "*.fap" | head -n1)
          echo "path=$FAP_PATH" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: flipper-fap
          path: ${{ steps.find_fap.outputs.path }}

  build-esp32:
    name: Build - ESP32 devboard firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware
        run: |
          cd esp32-bridge
          pio run
      - uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: esp32-bridge/.pio/build/esp32-s2-devboard/firmware.bin

  # Only runs on a manual "Run workflow" dispatch where a version was typed
  # in. Waits on the three build/test jobs above so we never tag a build
  # that didn't pass, then creates + pushes the tag itself. This lets you
  # release with a button click instead of `git tag vX.Y.Z && git push --tags`.
  tag-version:
    name: Create version tag
    needs: [test-python, build-flipper, build-esp32]
    if: github.event_name == 'workflow_dispatch' && inputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize tag name
        id: normalize
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != v* ]]; then VERSION="v$VERSION"; fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.normalize.outputs.tag }}
          git push origin ${{ steps.normalize.outputs.tag }}

  release:
    name: Create GitHub Release
    needs: [test-python, build-flipper, build-esp32, tag-version]
    # Fires either for a normal `git push --tags` (existing behavior) or
    # right after tag-version creates a tag from a manual dispatch.
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') || needs.tag-version.outputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flipper-fap
          path: release/flipper
      - uses: actions/download-artifact@v4
        with:
          name: esp32-firmware
          path: release/esp32
      - name: Package Linux TUI source
        run: |
          tar -czf release/ai-chat-tui-src.tar.gz linux-tui
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-version.outputs.tag || github.ref_name }}
          files: |
            release/flipper/*.fap
            release/esp32/firmware.bin
            release/ai-chat-tui-src.tar.gz
          generate_release_notes: true
