name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.4.0 or v1.4.0). Leave blank for a normal build with no release."
        required: false
        type: string

jobs:
  test-python:
    name: Test - Linux TUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + test deps
        run: |
          cd linux-tui
          pip install .
          pip install pytest
      - name: Run tests
        run: |
          cd linux-tui
          pytest -v

  build-flipper:
    name: Build - Flipper app (.fap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ufbt
        run: pip install ufbt
      - name: Build fap
        run: |
          cd flipper-app
          ufbt update
          ufbt build
      - name: Locate built fap
        id: find_fap
        run: |
          echo "Searching for .fap under flipper-app/ ..."
          FAP_PATH=$(find flipper-app -iname "*.fap" | head -n1)

          if [ -z "$FAP_PATH" ]; then
            echo "Not found under flipper-app/. Checking uFBT's state dir instead..."
            FAP_PATH=$(find "$HOME/.ufbt" -iname "*.fap" 2>/dev/null | head -n1)
          fi

          if [ -z "$FAP_PATH" ]; then
            echo "::error::No .fap file found anywhere. Dumping directory trees for debugging:"
            echo "--- flipper-app/ (depth 4) ---"
            find flipper-app -maxdepth 4 | sed 's/^/  /'
            echo "--- \$HOME/.ufbt/build (depth 4) ---"
            find "$HOME/.ufbt/build" -maxdepth 4 2>/dev/null | sed 's/^/  /'
            exit 1
          fi

          echo "Found: $FAP_PATH"
          echo "path=$FAP_PATH" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: flipper-fap
          path: ${{ steps.find_fap.outputs.path }}

  build-esp32:
    name: Build - ESP32 devboard firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build firmware
        run: |
          cd esp32-bridge
          pio run
      - uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: esp32-bridge/.pio/build/esp32-s2-devboard/firmware.bin

      # ESP Web Tools needs the full flash image, not just the app binary:
      # bootloader + partition table (both produced by this build) and the
      # OTA-selector stub `boot_app0.bin`, which PlatformIO doesn't build -
      # it ships a prebuilt copy inside the Arduino framework package instead.
      - name: Assemble web installer bundle
        run: |
          set -eu
          BUILD_DIR="esp32-bridge/.pio/build/esp32-s2-devboard"
          OUT_DIR="webinstaller-out"
          mkdir -p "$OUT_DIR"

          cp "$BUILD_DIR/bootloader.bin" "$OUT_DIR/bootloader.bin"
          cp "$BUILD_DIR/partitions.bin" "$OUT_DIR/partitions.bin"
          cp "$BUILD_DIR/firmware.bin"   "$OUT_DIR/firmware.bin"

          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 \
            -iname "boot_app0.bin" | head -n1)
          if [ -z "$BOOT_APP0" ]; then
            echo "::error::Could not find boot_app0.bin in the Arduino framework package."
            find ~/.platformio/packages/framework-arduinoespressif32 -iname "*.bin" | sed 's/^/  /'
            exit 1
          fi
          cp "$BOOT_APP0" "$OUT_DIR/boot_app0.bin"

          # Page + manifest live in the repo; just stamp a version into the
          # manifest so the installer page can show what it's flashing.
          cp webinstaller/index.html "$OUT_DIR/index.html"
          VERSION="${{ inputs.version || github.ref_name }}"
          sed "s/__VERSION__/${VERSION#v}/" webinstaller/manifest.json > "$OUT_DIR/manifest.json"

          ls -la "$OUT_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: esp32-webinstaller
          path: webinstaller-out

  # Only runs on a manual "Run workflow" dispatch where a version was typed
  # in. Waits on the three build/test jobs above so we never tag a build
  # that didn't pass, then creates + pushes the tag itself. This lets you
  # release with a button click instead of `git tag vX.Y.Z && git push --tags`.
  tag-version:
    name: Create version tag
    needs: [test-python, build-flipper, build-esp32]
    if: github.event_name == 'workflow_dispatch' && inputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize tag name
        id: normalize
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != v* ]]; then VERSION="v$VERSION"; fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.normalize.outputs.tag }}
          git push origin ${{ steps.normalize.outputs.tag }}

  release:
    name: Create GitHub Release
    needs: [test-python, build-flipper, build-esp32, tag-version]
    # Fires either for a normal `git push --tags` (existing behavior) or
    # right after tag-version creates a tag from a manual dispatch.
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') || needs.tag-version.outputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flipper-fap
          path: release/flipper
      - uses: actions/download-artifact@v4
        with:
          name: esp32-firmware
          path: release/esp32
      - uses: actions/download-artifact@v4
        with:
          name: esp32-webinstaller
          path: release/webinstaller
      - name: Package Linux TUI source
        run: |
          tar -czf release/ai-chat-tui-src.tar.gz linux-tui
      - name: Package web installer bundle
        run: |
          cd release/webinstaller
          zip -r ../esp32-webinstaller.zip .
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag-version.outputs.tag || github.ref_name }}
          files: |
            release/flipper/*.fap
            release/esp32/firmware.bin
            release/esp32-webinstaller.zip
            release/ai-chat-tui-src.tar.gz
          generate_release_notes: true

  # Publishes the flasher at a stable URL (https://<owner>.github.io/<repo>/).
  # Runs on every push to main (so the page always reflects main), and also
  # on releases (tag push, or a workflow_dispatch that created a tag) so a
  # release always re-publishes even if main didn't move in between.
  # One-time setup required: repo Settings -> Pages -> Source -> "GitHub Actions".
  deploy-installer:
    name: Publish web installer to GitHub Pages
    needs: [build-esp32, tag-version]
    if: |
      always() &&
      needs.build-esp32.result == 'success' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        startsWith(github.ref, 'refs/tags/v') ||
        needs.tag-version.outputs.tag != ''
      )
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: esp32-webinstaller
          path: pages-out
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-out
      - id: deployment
        uses: actions/deploy-pages@v4
