; Flipper Zero WiFi Devboard is an ESP32-S2. This targets the generic
; esp32-s2-saola-1 board definition, which matches the devboard's pinout
; closely enough for UART0 + WiFi use (no devboard-specific peripherals
; like the SD card are touched by this firmware).
[env:esp32-s2-devboard]
platform = espressif32
board = esp32-s2-saola-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bblanchon/ArduinoJson@^7.1.0
    https://github.com/jnthas/Improv-WiFi-Library.git

build_flags =
    -D AI_CHAT_UART_BAUD=115200
    -D FIRMWARE_VERSION=\"0.0.0-dev\"
